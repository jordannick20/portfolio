<!DOCTYPE html>

<html lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/spin.js/2.3.2/spin.min.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/"><link>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Photo album</title>
        <script type="module" src="src/main.js"></script>
    </head>
    <body>
        <div class="g-loading-overlay"></div>
        <main id="p-page">
            <header id="s-header">_Photo.Album v5.0 Vanilla JS with FlexBox / Sass</header>
            <div id="s-controls">
                <button id="btnPrevious">Previous</button>
                <button id="btnNext">Next</button>
                <button id="btnJumpTo">Jump</button>
                <button id="btnAddComment">Comment</button>
                <span id="photoCounter"></span>
            </div>

            <div id="jumpPanel" class="hidden">
                <div id="thumbnailContainer"></div>
            </div>
            <div id="commentPanel" class="hidden">
                <textarea id="txtAuthor" type="text" maxlength="40" placeholder="Author"></textarea>
                <textarea id="txtComment" maxlength="100" placeholder="Comment"></textarea>
                <button id="btnCommentOK">OK</button>
            </div>

            <div id="s-album">
                <img id="photoImage" src="" alt="">
                <div id="warning"></div>
                <p id="photoTitle"></p>
                <p id="photoCaption"></p>
            </div>

            <div id="commentsList"></div>
        </main>
    </body>
</html>
